<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Form Presensi Pegawai - Korwil SINE</title>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- MediaPipe Face Detection (Ringan & Akurat) -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js"></script>
  <style>
    /* ==================== FAKE GPS BLOCKER STYLES ==================== */
    #fakeGPSBlocker {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.95);
      z-index: 10000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
      display: none;
    }

    .fakegps-content {
      max-width: 500px;
      padding: 30px;
      border-radius: 20px;
      background: white;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
    }

    .fakegps-icon {
      font-size: 5rem;
      color: #f44336;
      margin-bottom: 20px;
      animation: shake 0.8s cubic-bezier(.36,.07,.19,.97) infinite;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); }
      20%, 40%, 60%, 80% { transform: translateX(10px); }
    }

    .fakegps-title {
      font-size: 2rem;
      margin-bottom: 15px;
      color: #d32f2f;
      font-weight: 700;
    }

    .fakegps-message {
      font-size: 1.1rem;
      margin-bottom: 25px;
      line-height: 1.6;
      color: #555;
    }

    .fakegps-warning {
      background: #ffebee;
      border-left: 4px solid #f44336;
      padding: 15px;
      margin: 20px 0;
      text-align: left;
      border-radius: 0 8px 8px 0;
    }

    .fakegps-warning i {
      color: #f44336;
      margin-right: 10px;
    }

    .fakegps-instructions {
      background: #e8f5e9;
      border-left: 4px solid #4caf50;
      padding: 15px;
      margin: 20px 0;
      text-align: left;
      border-radius: 0 8px 8px 0;
    }

    .fakegps-instructions i {
      color: #4caf50;
      margin-right: 10px;
    }

    .fakegps-footer {
      margin-top: 25px;
      font-size: 0.9rem;
      color: #777;
    }

    /* ==================== DESKTOP BLOCKER STYLES ==================== */
    #desktopBlocker {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #4361ee, #3a56d4);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      padding: 20px;
      text-align: center;
      display: none;
    }

    .blocker-content {
      max-width: 600px;
      padding: 30px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
    }

    .blocker-icon {
      font-size: 4rem;
      margin-bottom: 20px;
      color: #ffcc00;
    }

    .blocker-title {
      font-size: 2.2rem;
      margin-bottom: 20px;
      font-weight: 700;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
    }

    .blocker-message {
      font-size: 1.1rem;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .device-icons {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin: 30px 0;
    }

    .device-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .device-icon i {
      font-size: 3.5rem;
      color: white;
    }

    .device-icon span {
      font-size: 1rem;
    }

    .blocker-footer {
      margin-top: 30px;
      font-size: 0.9rem;
      opacity: 0.8;
    }

    /* ==================== SPLASH SCREEN STYLES ==================== */
    #splashScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #4361ee, #3a56d4);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9998;
      opacity: 1;
      transition: opacity 0.8s ease-out;
      overflow: hidden;
    }
    
    #splashScreen.hide {
      opacity: 0;
      pointer-events: none;
    }
    
    .splash-content {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    
    .splash-logo-container {
      width: 180px;
      height: 180px;
      margin-bottom: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: zoomIn 1.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      transform-origin: center;
    }
    
    .splash-logo {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.3));
    }
    
    @keyframes zoomIn {
      0% { transform: scale(0.1); opacity: 0; }
      70% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    
    .splash-text-container {
      overflow: hidden;
      margin-top: 20px;
    }
    
    .splash-text {
      color: white;
      font-size: 2.4rem;
      font-weight: 700;
      text-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
      letter-spacing: 1px;
      opacity: 0;
      animation: fadeInUp 1s ease-out 1.2s forwards;
      transform: translateY(20px);
    }
    
    .splash-subtext {
      color: rgba(255, 255, 255, 0.9);
      font-size: 1.2rem;
      margin-top: 15px;
      opacity: 0;
      animation: fadeIn 1s ease-out 1.5s forwards;
    }
    
    .progress-container {
      width: 240px;
      height: 8px;
      background: rgba(255, 255, 255, 0.25);
      border-radius: 4px;
      margin-top: 40px;
      overflow: hidden;
      opacity: 0;
      animation: fadeIn 0.8s ease-out 1.8s forwards;
      position: relative;
    }
    
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ffffff, #e0f7fa);
      border-radius: 4px;
      animation: progress 3s ease-in-out forwards;
    }
    
    .progress-pulse {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 20px;
      background: rgba(255, 255, 255, 0.7);
      border-radius: 4px;
      animation: pulse 1.5s infinite;
      opacity: 0;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    @keyframes fadeInUp {
      from { 
        opacity: 0;
        transform: translateY(20px);
      }
      to { 
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes progress {
      0% { width: 0%; }
      100% { width: 100%; }
    }
    
    @keyframes pulse {
      0% {
        transform: translateX(0) scaleX(1);
        opacity: 0.7;
      }
      100% {
        transform: translateX(240px) scaleX(2);
        opacity: 0;
      }
    }
    
    body.splash-active {
      overflow: hidden;
    }

    /* ==================== RADIUS WARNING POPUP ==================== */
    #radiusWarningPopup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 2000;
      display: none;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(5px);
    }

    .radius-warning-container {
      background: white;
      border-radius: 16px;
      width: 90%;
      max-width: 400px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      transform: scale(0.9);
      opacity: 0;
      animation: popupAppear 0.3s ease-out forwards;
    }

    @keyframes popupAppear {
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .radius-warning-header {
      background: #FFF3E0;
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid #FFE0B2;
    }

    .radius-warning-icon {
      font-size: 3rem;
      color: #FF9800;
      margin-bottom: 10px;
      animation: pulse 1.5s infinite;
    }

    .radius-warning-title {
      color: #E65100;
      font-size: 1.3rem;
      font-weight: 600;
      margin: 0;
    }

    .radius-warning-body {
      padding: 20px;
    }

    .radius-warning-text {
      color: #555;
      text-align: center;
      margin-bottom: 15px;
      font-size: 1rem;
      line-height: 1.5;
    }

    .radius-details {
      background: #F5F5F5;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 20px;
    }

    .radius-detail-item {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
      font-size: 0.9rem;
    }

    .radius-detail-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #4361ee;
      margin-right: 10px;
    }

    .radius-progress-container {
      margin: 15px 0;
    }

    .radius-progress-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px;
      font-size: 0.85rem;
      color: #666;
    }

    .radius-progress-bar {
      height: 8px;
      background: #E0E0E0;
      border-radius: 4px;
      overflow: hidden;
    }

    .radius-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #FF9800, #FF5722);
      border-radius: 4px;
      width: 0%;
      transition: width 0.5s ease;
    }

    .radius-warning-footer {
      display: flex;
      border-top: 1px solid #EEE;
    }

    .radius-warning-btn {
      flex: 1;
      padding: 15px;
      border: none;
      background: none;
      font-weight: 600;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .radius-warning-btn.cancel {
      color: #F44336;
    }

    .radius-warning-btn.continue {
      color: #4361ee;
      border-left: 1px solid #EEE;
    }

    .radius-warning-btn:hover {
      background: #F5F5F5;
    }

    /* ==================== FACE BORDER + CAMERA OVERLAY ==================== */
    .camera-wrapper {
      position: relative;
      background: #000;
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    #video {
      width: 100%;
      border-radius: 12px;
      background: #000;
      display: block;
    }
    .mirror-mode {
      transform: scaleX(-1);
    }
    .face-overlay-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .face-guide-text {
      background: rgba(0,0,0,0.6);
      color: white;
      font-size: 0.85rem;
      padding: 5px 12px;
      border-radius: 40px;
      text-align: center;
      display: inline-block;
      margin-top: 8px;
    }
    .face-status-success {
      color: #4caf50;
      font-weight: bold;
    }
    .face-status-fail {
      color: #ff9800;
      font-weight: bold;
    }
    #faceStatusIndicator {
      margin-top: 8px;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    #captureBtn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .btn-secondary {
      background: #6c757d;
      color: white;
    }

    /* ==================== EXISTING STYLES ==================== */
    :root {
      --primary: #4361ee;
      --primary-dark: #3a56d4;
      --secondary: #3f37c9;
      --success: #4cc9f0;
      --danger: #f72585;
      --light: #f8f9fa;
      --dark: #212529;
      --gray: #6c757d;
      --border-radius: 12px;
      --box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #f5f7ff, #e6e9ff);
      padding: 20px;
      position: relative;
      min-height: 100vh;
      opacity: 0;
      animation: fadeInContent 1s ease-out forwards;
    }
    
    @keyframes fadeInContent {
      to { opacity: 1; }
    }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: var(--border-radius);
      box-shadow: var(--box-shadow);
      margin-bottom: 20px;
      position: relative;
    }

    .card-header {
      text-align: center;
      margin-bottom: 30px;
      position: relative;
    }

    .card-header::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      border-radius: 2px;
    }

    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 10px;
      display: block;
      object-fit: contain;
    }

    h1 {
      color: var(--dark);
      font-weight: 600;
      font-size: 1.8rem;
    }

    .subtitle {
      color: var(--gray);
      font-size: 0.95rem;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: var(--dark);
      font-size: 0.95rem;
    }

    input, select {
      width: 100%;
      padding: 14px;
      border: 1px solid #e0e0e0;
      border-radius: var(--border-radius);
      font-size: 0.95rem;
      transition: var(--transition);
      background-color: #f9f9f9;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.15);
      background-color: white;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: var(--border-radius);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(67, 97, 238, 0.3);
    }

    .btn-primary:disabled {
      background: #cccccc;
      transform: none;
      box-shadow: none;
      cursor: not-allowed;
    }

    .spinner {
      display: none;
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #message {
      margin: 20px 0;
      padding: 12px;
      border-radius: var(--border-radius);
      font-size: 0.9rem;
      text-align: center;
      display: none;
    }

    .error {
      background-color: #fff0f0;
      color: #dc3545;
      border: 1px solid #ffcccc;
      display: block;
    }

    .success {
      background-color: #f0fff4;
      color: #28a745;
      border: 1px solid #c3e6cb;
      display: block;
    }

    .logout-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      background: var(--danger);
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: var(--border-radius);
      cursor: pointer;
      font-weight: 500;
      transition: var(--transition);
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logout-btn:hover {
      background: #e01e6d;
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(247, 37, 133, 0.3);
    }

    .attendance-notification { background: #f8f9ff; border-radius: var(--border-radius); padding: 20px; margin-top: 15px; border: 1px solid #e0e6ff; }
    .attendance-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .attendance-title { display: flex; align-items: center; gap: 10px; font-weight: 600; }
    .current-time { background: var(--primary); color: white; padding: 6px 12px; border-radius: 20px; font-size: 0.9rem; display: flex; align-items: center; gap: 6px; }
    .time-slots { display: flex; gap: 15px; flex-wrap: wrap; }
    .time-slot { flex: 1; min-width: 140px; padding: 15px; border-radius: var(--border-radius); text-align: center; position: relative; overflow: hidden; }
    .time-slot.datang.active { background: linear-gradient(to bottom, rgba(76, 175, 80, 0.05), white); border: 1px solid rgba(76, 175, 80, 0.3); }
    .time-slot.pulang.active { background: linear-gradient(to bottom, rgba(33, 150, 243, 0.05), white); border: 1px solid rgba(33, 150, 243, 0.3); }
    .slot-header.datang { color: #4caf50; }
    .slot-header.pulang { color: #2196f3; }
    .slot-status.status-active { background: rgba(76, 175, 80, 0.15); color: #2e7d32; }
    .slot-status.status-inactive { background: rgba(158, 158, 158, 0.15); color: #616161; }
    .image-preview-container { margin-top: 15px; display: none; }
    .image-preview { max-width: 100%; max-height: 300px; border-radius: var(--border-radius); border: 1px solid #e0e0e0; }
    .location-info { background: #f8f9ff; border-radius: var(--border-radius); padding: 15px; margin-bottom: 20px; border: 1px solid #e0e6ff; }
    .gps-indicator { display: flex; align-items: center; gap: 10px; margin-top: 10px; padding: 10px; background: #f0f8ff; border-radius: var(--border-radius); }
    .gps-indicator .dot { width: 12px; height: 12px; border-radius: 50%; background-color: #ccc; }
    .gps-indicator .dot.active { background-color: #28a745; }
    #successPopup { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:2000; display: none; align-items:center; justify-content:center; }
    .success-content { background:white; padding:30px; border-radius:20px; text-align:center; max-width:90%; width:400px; animation: scaleIn 0.5s ease-out; }
    @keyframes scaleIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .success-icon { font-size: 5rem; color: #28a745; margin-bottom: 20px; animation: pulse 1.5s infinite; }
    .countdown { font-size: 1.2rem; font-weight: bold; color: #4361ee; margin-top: 20px; }
    .countdown-bar { height: 100%; width: 100%; background: linear-gradient(to right, #28a745, #4361ee); border-radius: 5px; animation: countdown 5s linear forwards; }
    @keyframes countdown { 0% { width: 100%; } 100% { width: 0%; } }
    @media (max-width: 480px) { .card { padding: 20px; } h1 { font-size: 1.5rem; } .time-slots { flex-direction: column; } .splash-text { font-size: 1.8rem; } }
  </style>
</head>
<body>
  <!-- Blocker & Overlay elements (existing) -->
  <div id="fakeGPSBlocker">...</div>
  <div id="desktopBlocker">...</div>
  <div id="splashScreen">...</div>
  <div id="logoutNotification" class="logout-notification">...</div>
  <div id="logoutModal" class="modal">...</div>
  <div id="gpsBlocker" class="gps-blocker">...</div>
  <div id="timeNotification" class="time-notification">...</div>
  <div id="successPopup">...</div>
  <div id="radiusWarningPopup">...</div>

  <div class="container">
    <div class="card">
      <button class="logout-btn" id="logoutButton"><i class="fas fa-sign-out-alt"></i> Logout</button>
      <div class="card-header">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Lambang_Kabupaten_Ngawi_%28svg%29.svg/500px-Lambang_Kabupaten_Ngawi_%28svg%29.svg.png" alt="Logo" class="logo">
        <h1>Presensi Pegawai</h1>
        <p class="subtitle">Korwil Kecamatan SINE - Tahun 2026</p>
      </div>
      <form id="presensiForm">
        <input type="hidden" id="sessionId" name="sessionId">
        <input type="hidden" id="presensiType" name="presensi">
        <input type="hidden" name="clientTime" id="clientTime">
        <input type="hidden" name="timeDrift" id="timeDrift">
        <input type="hidden" name="lastPresensiTime" id="lastPresensiTime">
        
        <div class="attendance-notification">...</div>
        <div class="form-group">
          <label for="namaLembaga">Nama Lembaga</label>
          <input type="text" id="namaLembaga" name="namaLembaga" readonly>
        </div>
        <div class="form-group">
          <label for="namaPegawai">Nama Pegawai</label>
          <input type="text" id="namaPegawai" name="namaPegawai" readonly>
        </div>
        <div class="form-group">
          <label>Bukti Dukung (Foto Wajah Dalam Border)</label>
          <div class="alert alert-light p-2 mb-2" style="font-size:0.9rem; border:1px solid #eee;">
            <div>1. Posisikan wajah tepat di dalam bingkai oval/lingkaran.</div>
            <div>2. Wajah harus jelas menghadap kamera.</div>
          </div>
          <!-- CAMERA DENGAN BORDER WAJAH -->
          <div class="camera-wrapper">
            <video id="video" autoplay playsinline style="width:100%; border-radius:12px; background:#000;"></video>
            <canvas id="faceOverlayCanvas" class="face-overlay-canvas"></canvas>
          </div>
          <div id="faceStatusIndicator">
            <i class="fas fa-face-smile"></i> <span id="faceStatusMsg">Memuat deteksi wajah...</span>
          </div>
          <button id="captureBtn" class="btn btn-primary" style="width:100%; margin-top:12px;" disabled>
            <i class="fas fa-camera"></i> Ambil Foto (Wajah harus dalam border)
          </button>
          <canvas id="canvas" style="display:none;"></canvas>
          <input type="hidden" id="photoData" name="photoData">
          <div id="imagePreviewContainer" class="image-preview-container">
            <img id="imagePreview" class="image-preview">
            <button id="retakeBtn" class="btn btn-secondary" style="margin-top:10px;"><i class="fas fa-camera"></i> Ambil Ulang</button>
          </div>
        </div>
        <div class="location-info">...</div>
        <div class="form-group">
          <label>Lokasi Saat Ini</label>
          <div style="display:flex; gap:10px;"><input type="text" id="latitude" placeholder="Latitude" readonly style="flex:1;"><input type="text" id="longitude" placeholder="Longitude" readonly style="flex:1;"></div>
          <div class="gps-indicator"><div class="dot" id="gpsDot"></div><span id="gpsStatus">Mendeteksi...</span></div>
        </div>
        <button type="submit" id="submitBtn" class="btn btn-primary">
          <div id="loadingSpinner" class="spinner"></div>
          <span id="submitText">Kirim Presensi</span>
        </button>
        <div id="message"></div>
      </form>
    </div>
  </div>

  <script>
    // ========== KAMERA + FACE DETECTION + BORDER VALIDATION ==========
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const photoData = document.getElementById('photoData');
    const captureBtn = document.getElementById('captureBtn');
    const cameraPreview = document.querySelector('.camera-wrapper');
    const imagePreview = document.getElementById('imagePreview');
    const imagePreviewContainer = document.getElementById('imagePreviewContainer');
    const retakeBtn = document.getElementById('retakeBtn');
    const faceOverlayCanvas = document.getElementById('faceOverlayCanvas');
    const ctxOverlay = faceOverlayCanvas.getContext('2d');
    const faceStatusMsg = document.getElementById('faceStatusMsg');
    
    let stream = null;
    let detectionInterval = null;
    let faceDetection = null;
    let isFaceInsideBorder = false;
    let detectionReady = false;
    
    // Fungsi gambar border wajah (oval/lingkaran)
    function drawFaceBorder() {
      if (!faceOverlayCanvas) return;
      const w = faceOverlayCanvas.width;
      const h = faceOverlayCanvas.height;
      if (w === 0 || h === 0) return;
      ctxOverlay.clearRect(0, 0, w, h);
      // Border berbentuk oval (panduan wajah)
      const centerX = w / 2;
      const centerY = h / 2.5; // sedikit ke atas agar natural
      const radiusX = w * 0.32;
      const radiusY = h * 0.28;
      ctxOverlay.beginPath();
      ctxOverlay.ellipse(centerX, centerY, radiusX, radiusY, 0, 0, 2 * Math.PI);
      ctxOverlay.strokeStyle = '#00ffcc';
      ctxOverlay.lineWidth = 4;
      ctxOverlay.setLineDash([8, 12]);
      ctxOverlay.stroke();
      ctxOverlay.setLineDash([]);
      ctxOverlay.beginPath();
      ctxOverlay.ellipse(centerX, centerY, radiusX+2, radiusY+2, 0, 0, 2 * Math.PI);
      ctxOverlay.strokeStyle = '#ffffffaa';
      ctxOverlay.lineWidth = 2;
      ctxOverlay.stroke();
      
      // teks panduan
      ctxOverlay.font = "bold 14px Poppins";
      ctxOverlay.fillStyle = "#ffffffcc";
      ctxOverlay.shadowBlur = 0;
      ctxOverlay.fillText("👤 Letakkan wajah di dalam border", centerX-100, centerY - radiusY - 8);
    }
    
    function resizeOverlay() {
      const videoRect = video.getBoundingClientRect();
      if (videoRect.width > 0) {
        faceOverlayCanvas.width = videoRect.width;
        faceOverlayCanvas.height = videoRect.height;
        drawFaceBorder();
      }
    }
    
    // Inisialisasi MediaPipe Face Detection
    async function initFaceDetection() {
      faceDetection = new FaceDetection({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/${file}`
      });
      faceDetection.setOptions({
        model: 'short',
        minDetectionConfidence: 0.6
      });
      faceDetection.onResults(onFaceResults);
      await faceDetection.initialize();
      detectionReady = true;
      startDetectionLoop();
    }
    
    function onFaceResults(results) {
      if (!video.videoWidth || !detectionReady) return;
      const videoWidth = video.videoWidth;
      const videoHeight = video.videoHeight;
      const canvasW = faceOverlayCanvas.width;
      const canvasH = faceOverlayCanvas.height;
      if (canvasW === 0) return;
      
      let faceValid = false;
      if (results.detections && results.detections.length > 0) {
        const face = results.detections[0];
        const bbox = face.boundingBox;
        const centerX = bbox.xCenter * canvasW;
        const centerY = bbox.yCenter * canvasH;
        // wilayah border yang diizinkan (oval)
        const borderCenterX = canvasW / 2;
        const borderCenterY = canvasH / 2.5;
        const radiusX = canvasW * 0.32;
        const radiusY = canvasH * 0.28;
        const dx = (centerX - borderCenterX) / radiusX;
        const dy = (centerY - borderCenterY) / radiusY;
        const insideEllipse = (dx*dx + dy*dy) <= 1.0;
        if (insideEllipse && bbox.width > 0.08 * canvasW) {
          faceValid = true;
        }
      }
      isFaceInsideBorder = faceValid;
      if (isFaceInsideBorder) {
        faceStatusMsg.innerHTML = "✅ Wajah terdeteksi dalam border ✅";
        faceStatusMsg.style.color = "#4caf50";
        captureBtn.disabled = false;
      } else {
        faceStatusMsg.innerHTML = "⚠️ Wajah belum pas di dalam border! Posisikan wajah anda ⚠️";
        faceStatusMsg.style.color = "#ff9800";
        captureBtn.disabled = true;
      }
    }
    
    async function startDetectionLoop() {
      if (!faceDetection || !video.videoWidth) return;
      const detectFrame = async () => {
        if (video.readyState === 4 && !video.paused && !video.ended && detectionReady) {
          await faceDetection.send({image: video});
        }
        if (detectionInterval) requestAnimationFrame(detectFrame);
      };
      detectionInterval = true;
      requestAnimationFrame(detectFrame);
    }
    
    // Kamera Depan + Setup Overlay
    async function startCamera() {
      try {
        if (stream) {
          stream.getTracks().forEach(t => t.stop());
        }
        const constraints = { video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } } };
        stream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = stream;
        video.classList.add('mirror-mode');
        await new Promise(resolve => { video.onloadedmetadata = resolve; });
        video.play();
        setTimeout(() => {
          resizeOverlay();
          drawFaceBorder();
        }, 200);
        window.addEventListener('resize', () => { resizeOverlay(); drawFaceBorder(); });
        new ResizeObserver(() => { resizeOverlay(); drawFaceBorder(); }).observe(video);
        captureBtn.disabled = true;
        isFaceInsideBorder = false;
        if (!faceDetection) await initFaceDetection();
      } catch (err) { console.error("Kamera error:", err); alert("Tidak dapat akses kamera."); }
    }
    
    // Capture foto jika wajah dalam border
    captureBtn.addEventListener('click', () => {
      if (!isFaceInsideBorder) { alert("Wajah tidak berada dalam border! Posisikan ulang."); return; }
      const ctx = canvas.getContext('2d');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.translate(canvas.width, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
      imagePreview.src = dataUrl;
      photoData.value = dataUrl;
      imagePreviewContainer.style.display = 'block';
      if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
      document.querySelector('.camera-wrapper').style.display = 'none';
      if (detectionInterval) detectionInterval = false;
      window.capturedFile = dataURLtoBlob(dataUrl);
    });
    
    retakeBtn.addEventListener('click', () => {
      imagePreviewContainer.style.display = 'none';
      document.querySelector('.camera-wrapper').style.display = 'block';
      startCamera();
    });
    
    function dataURLtoBlob(dataUrl) { const arr = dataUrl.split(','); const mime = arr[0].match(/:(.*?);/)[1]; const bstr = atob(arr[1]); let n = bstr.length; const u8arr = new Uint8Array(n); while(n--) u8arr[n] = bstr.charCodeAt(n); return new File([new Blob([u8arr], {type: mime})], "presensi.jpg", {type: 'image/jpeg'}); }
    
    // ========== SISANYA: PRESENSI, GPS, RADIUS DLL ==========
    const PROXY_URL = '/api/proxy';
    let watchID = null;
    function calculateDistance(lat1,lng1,lat2,lng2){ const R=6371e3; const φ1=lat1*Math.PI/180; const φ2=lat2*Math.PI/180; const Δφ=(lat2-lat1)*Math.PI/180; const Δλ=(lng2-lng1)*Math.PI/180; const a=Math.sin(Δφ/2)**2+Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2; const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)); return R*c; }
    function detectFakeGPS(p){ if(p.mocked) return true; const now=Date.now(); const last=window.lastPos||{timestamp:0}; const dist=calculateDistance(last.lat||0,last.lng||0,p.coords.latitude,p.coords.longitude); window.lastPos={timestamp:now,lat:p.coords.latitude,lng:p.coords.longitude}; if((now-last.timestamp)/1000<5 && dist>500) return true; return false; }
    function showFakeGPSBlocker(){ document.getElementById('fakeGPSBlocker').style.display='flex'; document.getElementById('submitBtn').disabled=true; }
    function checkDevice(){ const ua=navigator.userAgent; const isMobile=/Android|iPhone|iPad|iPod/i.test(ua); if(!isMobile){ document.getElementById('desktopBlocker').style.display='flex'; return false; } return true; }
    document.addEventListener('DOMContentLoaded',()=>{ if(!checkDevice()) return; document.body.classList.add('splash-active'); setTimeout(()=>{ const splash=document.getElementById('splashScreen'); splash.classList.add('hide'); setTimeout(()=>{ splash.style.display='none'; initializeApp(); },800); },3000); });
    
    function getPresensiParams(){ const friday=new Date().getDay()===5; return { datangStart:6, datangEnd:7, pulangStart:friday?14.5:15, pulangEnd:16.5 }; }
    function isFriday(){ return new Date().getDay()===5; }
    function updateAttendanceStatus(){ const now=new Date(); const hours=now.getHours()+now.getMinutes()/60; const p=getPresensiParams(); const isDatang=hours>=p.datangStart && hours<p.datangEnd; const isPulang=hours>=p.pulangStart && hours<p.pulangEnd; document.getElementById('presensiType').value=isDatang?'Datang':(isPulang?'Pulang':''); const datangEl=document.querySelector('.time-slot.datang'); const pulangEl=document.querySelector('.time-slot.pulang'); if(datangEl){ if(isDatang){ datangEl.classList.add('active'); datangEl.querySelector('.slot-status').textContent='Aktif Sekarang'; datangEl.querySelector('.slot-status').className='slot-status status-active'; } else { datangEl.classList.remove('active'); datangEl.querySelector('.slot-status').textContent='Tidak Aktif'; } } if(pulangEl){ if(isPulang){ pulangEl.classList.add('active'); pulangEl.querySelector('.slot-status').textContent='Aktif Sekarang'; pulangEl.querySelector('.slot-status').className='slot-status status-active'; } else { pulangEl.classList.remove('active'); pulangEl.querySelector('.slot-status').textContent='Tidak Aktif'; } } }
    function isValidPresensiTime(){ const h=new Date().getHours()+new Date().getMinutes()/60; const p=getPresensiParams(); return (h>=p.datangStart && h<p.datangEnd) || (h>=p.pulangStart && h<p.pulangEnd); }
    function startLocationTracking(){ if(watchID) navigator.geolocation.clearWatch(watchID); navigator.geolocation.watchPosition(pos=>{ if(detectFakeGPS(pos)){ showFakeGPSBlocker(); return; } document.getElementById('latitude').value=pos.coords.latitude; document.getElementById('longitude').value=pos.coords.longitude; const data=JSON.parse(localStorage.getItem('sessionData')); if(data){ const dist=calculateDistance(pos.coords.latitude,pos.coords.longitude,data.lembagaLatitude,data.lembagaLongitude); document.getElementById('distanceValue').innerText=dist.toFixed(2); document.getElementById('distanceValue').style.color=dist>data.lembagaRadius?'#f44336':'#4caf50'; } document.getElementById('gpsStatus').innerHTML='<i class="fas fa-check-circle" style="color:#28a745;"></i> Lokasi aktif'; document.getElementById('gpsDot').classList.add('active'); }, err=>{ document.getElementById('gpsBlocker').style.display='flex'; },{enableHighAccuracy:true,timeout:5000}); }
    function updateCurrentTime(){ const now=new Date(); const wib=new Date(now.getTime()+(7*3600000)); document.getElementById('currentTime').innerText=wib.toLocaleTimeString('id-ID')+' WIB'; }
    async function initializeApp(){ 
      document.getElementById('logoutButton').onclick=()=>document.getElementById('logoutModal').style.display='flex';
      document.querySelector('.modal-btn.cancel').onclick=()=>document.getElementById('logoutModal').style.display='none';
      document.querySelector('.modal-btn.logout').onclick=async()=>{ localStorage.clear(); window.location.href='/'; };
      const sessionId=new URLSearchParams(location.search).get('session')||localStorage.getItem('sessionId'); if(!sessionId){ alert('Sesi tidak valid.'); logout(); return; }
      document.getElementById('sessionId').value=sessionId;
      try{ const resp=await fetch(`${PROXY_URL}?action=getSession`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sessionId})}); const user=await resp.json(); if(!user) throw new Error(); localStorage.setItem('sessionData',JSON.stringify(user)); document.getElementById('namaLembaga').value=user.namaLembaga; document.getElementById('namaPegawai').value=user.namaPegawai; document.getElementById('lembagaLatitude').innerText=user.lembagaLatitude; document.getElementById('lembagaLongitude').innerText=user.lembagaLongitude; document.getElementById('lembagaRadius').innerText=`(Radius: ${user.lembagaRadius} m)`; document.getElementById('radiusValue').innerText=user.lembagaRadius; startLocationTracking(); updateCurrentTime(); setInterval(updateCurrentTime,1000); updateAttendanceStatus(); setInterval(updateAttendanceStatus,60000); startCamera(); // kamera dengan border wajah
      }catch(e){ alert('Gagal load sesi'); logout(); }
    }
    function showRadiusConfirmation(dist,rad,nama){ document.getElementById('radiusWarningText').innerHTML=`Anda berada ${dist.toFixed(2)}m dari ${nama} (radius: ${rad}m). Tetap lanjutkan?`; document.getElementById('warningLembaga').innerHTML=nama; document.getElementById('warningDistance').innerHTML=`Jarak: ${dist.toFixed(2)} meter`; document.getElementById('warningRadius').innerHTML=`Radius: ${rad} meter`; const percent=Math.min(100,(dist/rad)*100); document.getElementById('progressPercentage').innerText=Math.round(percent)+'%'; document.getElementById('radiusProgressFill').style.width=`${percent}%`; document.getElementById('radiusWarningPopup').style.display='flex'; }
    window.continuePresensi=function(){ document.getElementById('radiusWarningPopup').style.display='none'; submitPresensiForm(); };
    window.cancelPresensi=function(){ document.getElementById('radiusWarningPopup').style.display='none'; document.getElementById('submitBtn').disabled=false; document.getElementById('loadingSpinner').style.display='none'; document.getElementById('submitText').innerText='Kirim Presensi'; };
    function showSuccessPopup(){ const pop=document.getElementById('successPopup'); pop.style.display='flex'; let sec=5; const interval=setInterval(()=>{ sec--; document.getElementById('countdownText').innerText=`${sec} detik`; if(sec<=0){ clearInterval(interval); logout(); } },1000); }
    async function submitPresensiForm(){ const lat=document.getElementById('latitude').value, lng=document.getElementById('longitude').value; if(!lat||!lng){ alert('Lokasi belum didapat'); return; } if(!window.capturedFile){ alert('Ambil foto terlebih dahulu dengan wajah dalam border!'); return; } document.getElementById('submitBtn').disabled=true; document.getElementById('loadingSpinner').style.display='block'; document.getElementById('submitText').innerText='Mengirim...'; const reader=new FileReader(); reader.onload=async(e)=>{ const base64=e.target.result.split(',')[1]; const payload={ sessionId:document.getElementById('sessionId').value, presensi:document.getElementById('presensiType').value, namaLembaga:document.getElementById('namaLembaga').value, namaPegawai:document.getElementById('namaPegawai').value, latitude:lat, longitude:lng, file:{name:'presensi.jpg',type:'image/jpeg',data:base64}, clientTime:new Date().toISOString(), timeDrift:0, lastPresensiTime:localStorage.getItem('lastPresensi')||'' }; try{ const res=await fetch(`${PROXY_URL}?action=presensi`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}); const result=await res.json(); if(result.success){ showSuccessPopup(); }else{ alert(result.message||'Gagal'); document.getElementById('submitBtn').disabled=false; document.getElementById('loadingSpinner').style.display='none'; document.getElementById('submitText').innerText='Kirim Presensi'; } }catch(err){ alert('Error: '+err.message); document.getElementById('submitBtn').disabled=false; } }; reader.readAsDataURL(window.capturedFile); }
    document.getElementById('presensiForm').addEventListener('submit',(e)=>{ e.preventDefault(); if(!isValidPresensiTime()){ alert('Di luar jam presensi!'); return; } const lat=parseFloat(document.getElementById('latitude').value), lng=parseFloat(document.getElementById('longitude').value); const data=JSON.parse(localStorage.getItem('sessionData')); if(!data){ alert('Sesi error'); return; } const dist=calculateDistance(lat,lng,data.lembagaLatitude,data.lembagaLongitude); if(dist>data.lembagaRadius){ showRadiusConfirmation(dist,data.lembagaRadius,data.namaLembaga); document.getElementById('submitBtn').disabled=true; }else{ submitPresensiForm(); } });
    async function logout(){ if(watchID)navigator.geolocation.clearWatch(watchID); localStorage.clear(); window.location.href='/'; }
    window.logout=logout;
  </script>
</body>
</html>
