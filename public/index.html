<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Presensi Pegawai - Korwil Sine</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #4361ee;
      --primary-dark: #3a56d4;
      --secondary: #3f37c9;
      --success: #4cc9f0;
      --danger: #f72585;
      --light: #f8f9fa;
      --dark: #212529;
      --gray: #6c757d;
      --border-radius: 12px;
      --box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #f5f7ff, #e6e9ff);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-container {
      background: white;
      padding: 40px;
      border-radius: var(--border-radius);
      width: 100%;
      max-width: 450px;
      box-shadow: var(--box-shadow);
      text-align: center;
      position: relative;
      overflow: hidden;
      z-index: 1;
    }

    .login-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 8px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      z-index: 2;
    }

    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      display: block;
      object-fit: contain;
    }

    h2 {
      color: var(--dark);
      font-weight: 600;
      margin-bottom: 10px;
      font-size: 1.8rem;
    }

    .subtitle {
      color: var(--gray);
      margin-bottom: 30px;
      font-size: 1.5rem;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: var(--dark);
      font-size: 0.95rem;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray);
      font-size: 1rem;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 14px 14px 14px 45px;
      border: 1px solid #e0e0e0;
      border-radius: var(--border-radius);
      font-size: 0.95rem;
      transition: var(--transition);
      background-color: #f9f9f9;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.15);
      background-color: white;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: var(--border-radius);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(67, 97, 238, 0.3);
    }

    .btn-primary:disabled {
      background: #cccccc;
      transform: none;
      box-shadow: none;
      cursor: not-allowed;
    }

    .spinner {
      display: none;
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #message {
      margin: 20px 0;
      padding: 12px;
      border-radius: var(--border-radius);
      font-size: 0.9rem;
      text-align: center;
    }

    .error {
      background-color: #fff0f0;
      color: #dc3545;
      border: 1px solid #ffcccc;
    }

    .success {
      background-color: #f0fff4;
      color: #28a745;
      border: 1px solid #c3e6cb;
    }

    .footer {
      margin-top: 30px;
      color: var(--gray);
      font-size: 0.8rem;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(0,0,0,0.4);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background-color: #fefefe;
      margin: auto;
      padding: 30px;
      border-radius: var(--border-radius);
      box-shadow: var(--box-shadow);
      width: 90%;
      max-width: 500px;
      position: relative;
      animation: fadeIn 0.3s ease-out;
      max-height: 90vh;
      overflow-y: auto;
    }

    .close-button {
      color: #aaa;
      float: right;
      font-size: 28px;
      font-weight: bold;
      position: absolute;
      top: 10px;
      right: 20px;
      cursor: pointer;
    }

    .close-button:hover {
      color: var(--danger);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    #forgotPasswordLink {
      display: block;
      margin-top: 15px;
      color: var(--primary);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
    }

    #forgotPasswordLink:hover {
      color: var(--primary-dark);
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Lambang_Kabupaten_Ngawi_%28svg%29.svg/500px-Lambang_Kabupaten_Ngawi_%28svg%29.svg.png" alt="Logo Kabupaten" class="logo">
    <h2>Presensi Pegawai</h2>
    <p class="subtitle">Korwil Kecamatan Sine</p>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username / NIP</label>
        <div class="input-wrapper">
          <i class="fas fa-user"></i>
          <input type="text" id="username" placeholder="Masukkan username atau NIP" required>
        </div>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" placeholder="Masukkan password" required>
        </div>
      </div>
      <button type="submit" id="loginBtn" class="btn btn-primary">
        <div id="loadingSpinner" class="spinner"></div>
        <span id="loginText">Login</span>
      </button>
      <div id="message"></div>
      <a href="#" id="forgotPasswordLink">Lupa Password?</a>
    </form>
    <div class="footer">Ⓨ 2026 Sistem Presensi ASN Korwil Sine</div>
  </div>

  <!-- Forgot Password Modal -->
  <div id="forgotPasswordModal" class="modal">
    <div class="modal-content">
      <span class="close-button">&times;</span>
      <h3>Reset Kata Sandi</h3>
      <div class="form-group">
        <label for="resetUsername">Username / NIP</label>
        <div class="input-wrapper">
          <i class="fas fa-user"></i>
          <input type="text" id="resetUsername" placeholder="Masukkan username atau NIP" required>
        </div>
      </div>
      <div class="form-group">
        <label for="newPassword">Kata Sandi Baru</label>
        <div class="input-wrapper">
          <i class="fas fa-lock"></i>
          <input type="password" id="newPassword" placeholder="Masukkan kata sandi baru" required>
        </div>
      </div>
      <button type="button" id="resetPasswordBtn" class="btn btn-primary">
        <div id="resetLoadingSpinner" class="spinner"></div>
        <span id="resetBtnText">Reset Sandi</span>
      </button>
      <div id="resetMessage" class="message"></div>
    </div>
  </div>

  <script>
    // Proxy URL (relatif)
    const PROXY_URL = '/api/proxy';

    const loginForm = document.getElementById('loginForm');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const messageEl = document.getElementById('message');
    const loginBtn = document.getElementById('loginBtn');
    const loadingSpinner = document.getElementById('loadingSpinner');
    const loginText = document.getElementById('loginText');

    // Forgot Password elements
    const forgotPasswordLink = document.getElementById('forgotPasswordLink');
    const forgotPasswordModal = document.getElementById('forgotPasswordModal');
    const closeButton = document.querySelector('.close-button');
    const resetUsernameInput = document.getElementById('resetUsername');
    const newPasswordInput = document.getElementById('newPassword');
    const resetPasswordBtn = document.getElementById('resetPasswordBtn');
    const resetLoadingSpinner = document.getElementById('resetLoadingSpinner');
    const resetBtnText = document.getElementById('resetBtnText');
    const resetMessageEl = document.getElementById('resetMessage');

    window.onload = () => {
      usernameInput.focus();
      localStorage.removeItem('sessionId');
    };

    // LOGIN
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      messageEl.textContent = '';
      messageEl.className = '';

      loginBtn.disabled = true;
      loadingSpinner.style.display = 'block';
      loginText.textContent = 'Memproses...';

      const username = usernameInput.value.trim();
      const password = passwordInput.value;

      try {
        const response = await fetch(`${PROXY_URL}?action=login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        if (!response.ok) {
          throw new Error(`HTTP error ${response.status}`);
        }

        const data = await response.json();

        if (data.success) {
          messageEl.textContent = 'Login berhasil! Mengarahkan...';
          messageEl.classList.add('success');
          localStorage.setItem('sessionId', data.sessionId);
          setTimeout(() => {
            window.location.href = `/form.html?session=${data.sessionId}`;
          }, 1000);
        } else {
          messageEl.textContent = data.message || 'Login gagal';
          messageEl.classList.add('error');
          passwordInput.focus();
        }
      } catch (err) {
        console.error('Fetch error:', err);
        messageEl.textContent = 'Terjadi kesalahan: ' + err.message;
        messageEl.classList.add('error');
      } finally {
        loginBtn.disabled = false;
        loadingSpinner.style.display = 'none';
        loginText.textContent = 'Login';
      }
    });

    // Forgot Password
    forgotPasswordLink.addEventListener('click', (e) => {
      e.preventDefault();
      forgotPasswordModal.style.display = 'flex';
      resetUsernameInput.focus();
    });

    closeButton.addEventListener('click', () => {
      forgotPasswordModal.style.display = 'none';
    });

    window.addEventListener('click', (event) => {
      if (event.target == forgotPasswordModal) {
        forgotPasswordModal.style.display = 'none';
      }
    });

    resetPasswordBtn.addEventListener('click', async () => {
      resetMessageEl.textContent = '';
      resetMessageEl.className = '';

      const username = resetUsernameInput.value.trim();
      const newPass = newPasswordInput.value;

      if (!username || !newPass) {
        resetMessageEl.textContent = 'Mohon lengkapi semua bidang.';
        resetMessageEl.classList.add('error');
        return;
      }

      resetPasswordBtn.disabled = true;
      resetLoadingSpinner.style.display = 'block';
      resetBtnText.textContent = 'Memproses...';

      try {
        const response = await fetch(`${PROXY_URL}?action=resetPassword`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, newPassword: newPass })
        });

        const data = await response.json();
        if (data.success) {
          resetMessageEl.textContent = data.message;
          resetMessageEl.classList.add('success');
          setTimeout(() => {
            forgotPasswordModal.style.display = 'none';
          }, 2000);
        } else {
          resetMessageEl.textContent = data.message;
          resetMessageEl.classList.add('error');
        }
      } catch (err) {
        resetMessageEl.textContent = 'Terjadi kesalahan: ' + err.message;
        resetMessageEl.classList.add('error');
      } finally {
        resetPasswordBtn.disabled = false;
        resetLoadingSpinner.style.display = 'none';
        resetBtnText.textContent = 'Reset Sandi';
      }
    });
  </script>
</body>
</html>
